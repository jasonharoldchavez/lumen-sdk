name: Lumen SDK Continuous Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  test-sdk:
    name: Validate Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest build

      - name: Install Lumen SDK
        run: |
          pip install -e .

      - name: Verify package import
        run: |
          python - <<'PY'
          import lumen
          print("Lumen SDK loaded successfully")
          PY

      - name: Run SDK tests
        run: |
          if [ -d tests ]; then
            pytest tests -v
          else
            echo "No tests directory found"
          fi

      - name: Build distribution
        run: |
          python -m build

      - name: Check package artifacts
        run: |
          ls -la dist/
