name: Lumen SDK Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run validation suite
        run: |
          python tests/blind_test.py
          python tests/chaos_test.py
          python tests/final_blind_test.py
          python tests/resiliency_test.py
          python tests/scale_test.py
